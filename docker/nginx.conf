# Upstream — группа бэкенд-серверов за Nginx.
# ml-api — имя сервиса из docker-compose.yml, Docker резолвит его в IP контейнера
upstream ml_api {
    server ml-api:5010;
}

server {
    listen 80;
    server_name localhost;

    # Логи запросов и ошибок пишутся в stdout/stderr контейнера.
    # Смотреть через: docker logs credit_default_nginx
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Все запросы проксируем на ML-сервис
    location / {
        proxy_pass         http://ml_api;
        # Передаём оригинальные заголовки — чтобы Flask видел реальный IP клиента,
        # а не адрес Nginx
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        # Таймауты для инференса модели — даём 60 секунд на ответ
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # /health опрашивается часто (Docker healthcheck, мониторинг),
    # поэтому отключаем для него access_log чтобы не засорять логи
    location /health {
        proxy_pass http://ml_api;
        access_log off;
    }
}